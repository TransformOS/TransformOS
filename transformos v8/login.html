<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransformOS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f3ee;
    --teal: #1a7a6e;
    --teal-light: #22a693;
    --amber: #d4820a;
    --amber-light: #f0a020;
    --mist: #e8e5dc;
    --ghost: #6b6860;
    --red: #c0392b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
  }

  /* ── HEADER */
  .site-header {
    padding: 24px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    color: var(--paper);
    text-decoration: none;
  }
  .logo span { color: var(--teal-light); }

  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    color: var(--ghost);
    text-transform: uppercase;
  }

  /* ── MAIN LAYOUT */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    position: relative;
  }

  .main::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(26,122,110,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── CARD */
  .auth-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 56px 48px;
    width: 100%;
    max-width: 480px;
    position: relative;
    animation: fadeUp 0.6s ease forwards;
  }

  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, var(--teal), var(--amber-light));
    border-radius: 12px 12px 0 0;
  }

  /* ── TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .tab {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ghost);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s ease;
  }

  .tab.active {
    color: var(--teal-light);
    border-bottom-color: var(--teal-light);
  }

  /* ── FORM TITLE */
  .form-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    line-height: 1;
  }

  .form-subtitle {
    font-size: 0.875rem;
    color: var(--ghost);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  /* ── FIELDS */
  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ghost);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 14px 16px;
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .field input:focus {
    border-color: var(--teal-light);
    background: rgba(34,166,147,0.06);
  }

  .field input::placeholder { color: rgba(255,255,255,0.2); }

  /* ── SUBMIT BUTTON */
  .btn-submit {
    width: 100%;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  .btn-submit:hover { background: var(--teal-light); transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; pointer-events: none; }

  /* ── ERROR / SUCCESS */
  .msg {
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 0.875rem;
    margin-bottom: 20px;
    display: none;
  }

  .msg.error { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4); color: #e07060; }
  .msg.success { background: rgba(26,122,110,0.15); border: 1px solid rgba(26,122,110,0.4); color: var(--teal-light); }
  .msg.visible { display: block; }

  /* ── PANEL TOGGLE */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── FOOTER */
  .footer-strip {
    padding: 24px 48px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3);
  }

  .footer-logo span { color: var(--teal); }

  .footer-legal {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">Transform<span>OS</span></a>
  <div class="header-tag">Client Portal</div>
</header>

<main class="main">
  <div class="auth-card">

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- ── LOGIN PANEL -->
    <div class="panel active" id="panel-login">
      <div class="form-title">Welcome Back</div>
      <p class="form-subtitle">Sign in to access your transformation portal.</p>

      <div class="msg error" id="login-error"></div>
      <div class="msg success" id="login-success"></div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@yourcompany.com" autocomplete="email">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-submit" id="login-btn" onclick="handleLogin()">Sign In →</button>
    </div>

    <!-- ── REGISTER PANEL -->
    <div class="panel" id="panel-register">
      <div class="form-title">Create Account</div>
      <p class="form-subtitle">Enter your access code and create your account to begin.</p>

      <div class="msg error" id="register-error"></div>
      <div class="msg success" id="register-success"></div>

      <div class="field">
        <label>Access Code</label>
        <input type="text" id="reg-code" placeholder="e.g. TRANSFORM-2026" autocomplete="off" style="text-transform:uppercase">
      </div>

      <div class="field">
        <label>Your Name</label>
        <input type="text" id="reg-name" placeholder="Jane Smith" autocomplete="name">
      </div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@yourcompany.com" autocomplete="email">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 8 characters" autocomplete="new-password">
      </div>

      <button class="btn-submit" id="register-btn" onclick="handleRegister()">Create Account →</button>
    </div>

  </div>
</main>

<footer class="footer-strip">
  <div class="footer-logo">Transform<span>OS</span></div>
  <div class="footer-legal">© 2026 TransformOS · transformos.co.uk</div>
</footer>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type} visible`;
  }

  function hideMsg(id) {
    document.getElementById(id).className = 'msg';
  }

  // ── LOGIN
  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');

    hideMsg('login-error');
    if (!email || !password) { showMsg('login-error', 'Please enter your email and password.', 'error'); return; }

    btn.textContent = 'Signing in…';
    btn.disabled = true;

    try {
      const res = await fetch('/.netlify/functions/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'login', email, password })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        showMsg('login-error', data.error || 'Login failed. Please try again.', 'error');
        btn.textContent = 'Sign In →';
        btn.disabled = false;
        return;
      }

      // Store session
      localStorage.setItem('tos_session', JSON.stringify({
        token: data.session.access_token,
        user: data.user,
        company: data.company,
        product_type: data.product_type,
        expires_at: data.session.expires_at
      }));

      showMsg('login-success', 'Signed in — redirecting to your portal…', 'success');

      // Redirect based on whether intake is complete
      setTimeout(() => {
        if (data.company && data.company.company_name) {
          window.location.href = 'portal.html';
        } else {
          window.location.href = 'intake.html';
        }
      }, 800);

    } catch (err) {
      showMsg('login-error', 'Connection error. Please try again.', 'error');
      btn.textContent = 'Sign In →';
      btn.disabled = false;
    }
  }

  // ── REGISTER
  async function handleRegister() {
    const access_code = document.getElementById('reg-code').value.trim().toUpperCase();
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const btn = document.getElementById('register-btn');

    hideMsg('register-error');

    if (!access_code || !name || !email || !password) {
      showMsg('register-error', 'Please fill in all fields.', 'error'); return;
    }
    if (password.length < 8) {
      showMsg('register-error', 'Password must be at least 8 characters.', 'error'); return;
    }

    btn.textContent = 'Creating account…';
    btn.disabled = true;

    try {
      const res = await fetch('/.netlify/functions/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'register', email, password, name, access_code })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        showMsg('register-error', data.error || 'Registration failed. Please try again.', 'error');
        btn.textContent = 'Create Account →';
        btn.disabled = false;
        return;
      }

      // Store session
      localStorage.setItem('tos_session', JSON.stringify({
        token: data.session.access_token,
        user: data.user,
        company: data.company,
        product_type: data.product_type,
        expires_at: data.session.expires_at
      }));

      showMsg('register-success', 'Account created — taking you to your intake form…', 'success');
      setTimeout(() => { window.location.href = 'intake.html'; }, 800);

    } catch (err) {
      showMsg('register-error', 'Connection error. Please try again.', 'error');
      btn.textContent = 'Create Account →';
      btn.disabled = false;
    }
  }

  // ── ENTER KEY SUPPORT
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('panel-login').classList.contains('active');
      if (loginActive) handleLogin();
      else handleRegister();
    }
  });

  // ── IF ALREADY LOGGED IN, REDIRECT
  const session = JSON.parse(localStorage.getItem('tos_session') || 'null');
  if (session && session.token) {
    const expiresAt = new Date(session.expires_at * 1000);
    if (expiresAt > new Date()) {
      window.location.href = session.company?.company_name ? 'portal.html' : 'intake.html';
    }
  }
</script>
</body>
</html>
